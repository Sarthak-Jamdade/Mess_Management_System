<!DOCTYPE html>
<html>

<head>

    <title>Mess Payment</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff, #f4f6f9);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #1f2937;
            color: white;
            padding: 25px;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            /* scroll if content large */
        }

        /* SIDEBAR PROFILE */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        #profile-pic_Sidebar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6366f1;
            cursor: pointer;
        }

        .profile-section h3 {
            margin-top: 10px;
        }

        /* SIDEBAR MENU */
        .sidebar ul {
            list-style: none;
            margin-top: 30px;
        }

        .sidebar ul li {
            margin: 18px 0;
        }

        .sidebar ul li a {
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active {
            background: #374151;
            color: white;
        }

        .sidebar ul li a i {
            width: 22px;
        }

        /* MAIN */

        .container {
            max-width: 900px;
            margin: 60px auto;
            margin-left: 320px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(60, 72, 100, .15);
            padding: 40px;
        }

        /* HEADER */

        .header {
            margin-bottom: 30px;
        }

        .header h2 {
            color: #2d3748;
        }

        /* PAYMENT CARD */

        .payment-box {
            background: #f9fafb;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }

        .payment-box h3 {
            margin-bottom: 15px;
        }

        .amount {
            font-size: 32px;
            font-weight: bold;
            color: #4f46e5;
            margin-bottom: 20px;
        }

        /* INPUT */

        input {
            width: 250px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        /* BUTTON */

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: .3s;
        }

        button:hover {
            background: #6366f1;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="profile-section">
            <!-- When I change the profile picture then this photo should also change -->

            <!-- <img src="{{ url_for('static', filename='profile/admin.jpg') }}" class="profile-pic" id="profile-pic_Sidebar"> -->
            <img src="/static/profile/{{ session['username'] }}.jpg" onerror="this.src='/static/profile/default.jpg'"
                class="profile-pic" id="profile-pic_Sidebar">
            <h3>Student</h3>

        </div>

        <ul>
            <li><a href="/student_dashboard"><i class="fa fa-home"></i>Dashboard</a></li>
            
            <li><a href="/student_profile"><i class="fa fa-user"></i>Profile</a></li>

            <li><a href="/my_subscription"><i class="fa fa-list"></i>My Subscription</a></li>

            <li><a href="/student_payment"><i class="fa fa-money-bill"></i>Payment</a></li>

            <li><a href="#"><i class="fa fa-calendar"></i>Attendance</a></li>

            <li><a href="/logout"><i class="fa fa-sign-out-alt"></i>Logout</a></li>
        </ul>

    </div>

    <!-- MAIN -->

    <div class="container">

        <div class="header">
            <h2>Mess Payment</h2>
        </div>

        {% if plan %}

        <div class="payment-box">

            <h3>{{ plan.plan_name }}</h3>

            <div class="amount">
                ₹ {{ plan.price }}
            </div>

            <form method="POST" action="/pay_bill">

                <input type="hidden" name="subscription_id" value="{{ subscription_id }}">

                <input type="hidden" name="amount" value="{{ plan.price }}">

                <label>Enter Mobile Number</label>

                <br>

                <input type="text" name="mobile" placeholder="Enter mobile number" required>

                <br>

                <button type="submit">
                    <i class="fa-solid fa-credit-card"></i>
                    Pay Now
                </button>

            </form>

        </div>

        {% else %}

        <div class="payment-box">

            <h3>No Payment Pending</h3>

            <p>Your mess plan is already paid or not approved yet.</p>

        </div>

        {% endif %}

    </div>

</body>

</html>
